<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.title != "" %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="container header-inner">
          <a class="brand" href="{{ '/' | relative_url }}">
            <span class="brand-name">{{ site.title }}</span>
            <span class="brand-tag">{{ site.description }}</span>
          </a>
          <nav class="site-nav" aria-label="Primary">
            {% for item in site.data.navigation %}
              <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
            {% endfor %}
          </nav>
        </div>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="container footer-inner">
          <p>{{ site.title }} · Department of Mathematics, University of Pennsylvania</p>
          <p><a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
        </div>
      </footer>
    </div>
  </body>
</html>
