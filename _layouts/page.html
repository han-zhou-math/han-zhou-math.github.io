---
layout: default
---
<section class="container page-content">
  <header class="page-header">
    <p class="eyebrow">{{ site.title }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="page-description">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="page-body">
    {{ content }}
  </div>
</section>
